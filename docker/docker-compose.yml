services:
  movie-recommender:
    build: ..
    env_file: ../.env
    volumes:
      - ../data:/app/data
    depends_on:
      - jackett
    restart: unless-stopped

  jackett:
    image: linuxserver/jackett:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
    ports:
      - "9117:9117"
    volumes:
      - jackett_config:/config
    restart: unless-stopped

volumes:
  jackett_config:
